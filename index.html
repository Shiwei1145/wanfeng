<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晚风の宣传站</title>
<style>
/* 全局重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
:root{
  --primary:#6366f1; /* 主色调：科技紫，更有网感 */
  --primary-light:#818cf8;
  --bg:#0f172a; /* 深色背景，更吸睛 */
  --card:#1e293b;
  --text:#f1f5f9;
  --text-light:#94a3b8;
  --accent:#22d3ee; /* 高亮色：青蓝色 */
}
body{background:var(--bg);color:var(--text);line-height:1.6}

/* 顶部导航 - 悬浮毛玻璃效果 */
.header{
  background:rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
  z-index:999;
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:bold;color:var(--accent);text-shadow:0 0 10px rgba(34,211,238,0.5)}
.menu a{
  color:var(--text);
  margin-left:24px;
  text-decoration:none;
  font-size:16px;
  transition:0.3s;
  position:relative;
}
.menu a:hover{
  color:var(--accent);
}
.menu a::after{
  content:'';
  position:absolute;
  bottom:-4px;
  left:0;
  width:0;
  height:2px;
  background:var(--accent);
  transition:0.3s;
}
.menu a:hover::after{width:100%}

/* 内容区 */
.container{max-width:1200px;margin:0 auto;padding:40px 20px}

/* 卡片样式 - 玻璃质感 */
.card{
  background:var(--card);
  border-radius:16px;
  padding:32px;
  margin-bottom:32px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 48px rgba(99,102,241,0.15);
}
.card h2{
  color:var(--accent);
  margin-bottom:20px;
  font-size:28px;
  position:relative;
  padding-left:16px;
}
.card h2::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:4px;
  background:linear-gradient(180deg, var(--primary), var(--accent));
  border-radius:2px;
}
.card p{
  color:var(--text-light);
  margin-bottom:16px;
  font-size:17px;
  line-height:1.8;
}

/* 视频区域 */
.video-item{
  margin-bottom:28px;
  padding-bottom:28px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.video-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.video-item h3{
  margin-bottom:12px;
  color:var(--text);
  font-size:22px;
}
.video-item p{
  color:var(--text-light);
  margin-bottom:16px;
  font-size:16px;
}

/* 视频封面图样式 - 发光悬浮效果 */
.video-cover{
  width:100%;
  max-width:720px;
  border-radius:12px;
  margin:16px 0;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 20px rgba(34,211,238,0.15);
  border:none;
}
.video-cover:hover{
  transform:scale(1.03);
  box-shadow:0 8px 32px rgba(34,211,238,0.3);
}

/* 群聊区域 - 居中高亮 */
.group-section{
  text-align:center;
  position:relative;
  overflow:hidden;
}
.group-section::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
  z-index:0;
}
.group-section > *{position:relative;z-index:1}
.group-name{
  font-size:26px;
  font-weight:bold;
  color:var(--accent);
  margin-bottom:12px;
  text-shadow:0 0 10px rgba(34,211,238,0.3);
}
.qrcode{
  width:300px;
  border-radius:16px;
  margin:24px 0;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  border:2px solid rgba(34,211,238,0.2);
}

/* 复制按钮 - 渐变发光 */
.copy-btn{
  background:linear-gradient(135deg, var(--primary), var(--accent));
  color:white;
  border:none;
  padding:14px 40px;
  border-radius:50px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin:12px 0;
  transition:0.3s;
  box-shadow:0 4px 16px rgba(99,102,241,0.4);
}
.copy-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(99,102,241,0.6);
}

.group-tip{
  color:var(--text-light);
  font-size:15px;
  margin-top:16px;
}

/* 复制提示 - 悬浮弹窗 */
.toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg, var(--primary), var(--accent));
  color:white;
  padding:12px 28px;
  border-radius:50px;
  font-size:16px;
  font-weight:bold;
  display:none;
  z-index:9999;
  box-shadow:0 8px 32px rgba(99,102,241,0.5);
}

/* 响应式适配 */
@media(max-width:768px){
  .menu a{margin-left:16px;font-size:15px}
  .qrcode{width:260px}
  .card{padding:24px}
  .card h2{font-size:24px}
  .video-item h3{font-size:20px}
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <div class="logo">晚风の宣传站</div>
    <div class="menu">
      <a href="#about">关于</a>
      <a href="#video">代表作</a>
      <a href="#group">粉丝群</a>
    </div>
  </div>
</div>

<div class="container">
  <!-- 关于区域 -->
  <div class="card" id="about">
    <h2>关于晚风</h2>
    <p>大家好，这里是晚风的专属宣传站！感谢每一位粉丝的关注与支持～</p>
    <p>这里会同步b站最新作品，欢迎大家加入粉丝群一起交流！</p>
  </div>

  <!-- 代表作区域 - 可点击跳转 -->
  <div class="card" id="video">
    <h2>代表作</h2>
    <div class="video-item">
      <h3>Paradox超详细攻略</h3>
      <p>全网最细保姆级教程，新手一看就会，轻松通关！</p>
      
      <!-- 封面图：对应你文件夹里的cover.jpg -->
      <a href="https://www.bilibili.com/video/BV1z2XTBUEPU/" target="_blank" style="text-decoration: none;">
        <img src="cover.jpg" class="video-cover" alt="Paradox攻略视频封面">
      </a>
    </div>
  </div>

  <!-- 粉丝群区域 -->
  <div class="card group-section" id="group">
    <h2>晚风の粉丝群</h2>
    <div class="group-name">晚风の专属群聊</div>
    
    <!-- 二维码：对应你文件夹里的prcode.jpg，已经改好文件名！ -->
    <img src="prcode.jpg" class="qrcode" alt="粉丝群二维码">

    <button class="copy-btn" onclick="copyGroup()">📋 点击复制群号</button>
    <p class="group-tip">扫码直接加入，或复制群号搜索加群</p>
  </div>
</div>

<!-- 复制成功提示 -->
<div id="toast" class="toast">✅ 群号复制成功！</div>

<script>
function copyGroup() {
  navigator.clipboard.writeText("908769617").then(() => {
    const toast = document.getElementById("toast");
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 1500);
  });
}
</script>

</body>
</html>
